# Deploy Django API + Next.js frontend to Azure Container Apps (Germany West Central) on push to main.
# Configure repository secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (OIDC; no client secret).
name: Deploy to Azure

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: cv-converter-agent
  ACR_NAME: cvconvacrgwc
  API_APP: cvconv-api
  WEB_APP: cvconv-web
  API_PUBLIC_URL: https://cvconv-api.orangefield-92a742dc.germanywestcentral.azurecontainerapps.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push API image
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            -t cv-api:${{ github.sha }} -t cv-api:latest \
            --file backend/Dockerfile backend --no-logs

      - name: Update API Container App
        run: |
          az containerapp update -n ${{ env.API_APP }} -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/cv-api:${{ github.sha }}

      - name: Build & push Web image
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            -t cv-web:${{ github.sha }} -t cv-web:latest \
            --file frontend/Dockerfile frontend \
            --build-arg NEXT_PUBLIC_API_BASE_URL_LOCAL=${{ env.API_PUBLIC_URL }} \
            --no-logs

      - name: Update Web Container App
        run: |
          az containerapp update -n ${{ env.WEB_APP }} -g ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/cv-web:${{ github.sha }}
